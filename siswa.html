<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Ujian</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .noselect { user-select: none; -webkit-user-select: none; }
    </style>
</head>
<body class="bg-slate-100 noselect" oncontextmenu="return false;">
    
    <header class="bg-blue-600 text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold">Ujian Aktif</h1>
                <p class="text-sm opacity-80" id="namaSiswa"></p>
            </div>
            <div class="text-right">
                <p class="text-xs uppercase tracking-wider opacity-80">Sisa Waktu</p>
                <p class="text-2xl font-mono font-bold" id="timerDisplay">01:30:00</p>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto p-4 md:p-6 grid grid-cols-1 md:grid-cols-4 gap-6 mt-4">
        <!-- Area Soal -->
        <div class="md:col-span-3 bg-white p-6 rounded-xl shadow-sm border border-slate-100">
            <div class="flex justify-between items-center mb-6 pb-4 border-b">
                <span class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-sm font-semibold">Soal No. 1</span>
                <span class="text-red-500 text-sm" id="warningText"></span>
            </div>
            
            <div class="text-lg text-slate-800 mb-8" id="teksSoal">
                Memuat soal ujian...
            </div>

            <div class="space-y-3" id="areaPilihan">
                <!-- Pilihan di-generate via JS -->
            </div>

            <div class="mt-8 flex justify-between pt-6 border-t">
                <button class="px-6 py-2 bg-slate-200 text-slate-700 rounded-lg hover:bg-slate-300">Sebelumnya</button>
                <button class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Selanjutnya</button>
            </div>
        </div>

        <!-- Navigasi Nomor -->
        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 h-fit">
            <h3 class="font-semibold text-center mb-4 pb-2 border-b">Navigasi Soal</h3>
            <div class="grid grid-cols-5 gap-2" id="navigasiSoal">
                <!-- Grid nomor di-generate via JS -->
            </div>
            <button class="w-full mt-6 bg-green-500 hover:bg-green-600 text-white py-2 rounded-lg font-semibold shadow-sm">Selesai Ujian</button>
        </div>
    </main>

    <script>
        // Cek Login
        const user = JSON.parse(sessionStorage.getItem('userCBT'));
        if(!user || user.role !== 'siswa') window.location.href = 'index.html';
        document.getElementById('namaSiswa').innerText = user.nama;

        // Anti-Cheat: Deteksi pindah tab (Blur Event)
        let pelanggaran = 0;
        window.addEventListener('blur', () => {
            pelanggaran++;
            document.getElementById('warningText').innerText = `Peringatan Pindah Tab (${pelanggaran}/3)`;
            if(pelanggaran >= 3) {
                alert("Ujian dihentikan karena sistem mendeteksi aktivitas mencurigakan berulang.");
                // Fungsi auto-submit berjalan di sini
                window.location.href = 'index.html';
            }
        });

        // Anti-Cheat: Cegah Copy Paste
        document.addEventListener('copy', (e) => { e.preventDefault(); return false; });
        document.addEventListener('paste', (e) => { e.preventDefault(); return false; });

        // Timer Realtime
        let waktu = 5400; // 90 menit
        setInterval(() => {
            waktu--;
            const jam = Math.floor(waktu / 3600);
            const menit = Math.floor((waktu % 3600) / 60);
            const detik = waktu % 60;
            document.getElementById('timerDisplay').innerText = 
                `${String(jam).padStart(2, '0')}:${String(menit).padStart(2, '0')}:${String(detik).padStart(2, '0')}`;
            if(waktu <= 0) alert("Waktu habis. Jawaban dikirim otomatis.");
        }, 1000);

        // Simulasi load soal
        const dummyPilihan = ['A. Jawaban Pertama', 'B. Jawaban Kedua', 'C. Jawaban Ketiga', 'D. Jawaban Keempat'];
        const areaPilihan = document.getElementById('areaPilihan');
        dummyPilihan.forEach((pilihan, index) => {
            areaPilihan.innerHTML += `
                <label class="flex items-center p-4 border rounded-lg cursor-pointer hover:bg-blue-50 transition-colors">
                    <input type="radio" name="jawaban" class="w-5 h-5 text-blue-600 border-gray-300 focus:ring-blue-500">
                    <span class="ml-3 text-slate-700">${pilihan}</span>
                </label>
            `;
        });

        const navSoal = document.getElementById('navigasiSoal');
        for(let i=1; i<=20; i++) {
            navSoal.innerHTML += `<div class="aspect-square flex items-center justify-center border rounded-md cursor-pointer hover:bg-slate-100 ${i==1 ? 'bg-blue-600 text-white border-blue-600 hover:bg-blue-700' : ''}">${i}</div>`;
        }
    </script>
</body>
</html>
