<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT Login - MIS Miftahussa'adah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="glass-card w-full max-w-md p-8 rounded-2xl relative overflow-hidden">
        <div class="text-center mb-8">
            <img src="https://via.placeholder.com/100/0284c7/ffffff?text=CBT" alt="Logo Sekolah" class="mx-auto rounded-full mb-4 shadow-lg w-20 h-20">
            <h2 class="text-2xl font-bold text-slate-800">CBT Portal</h2>
            <p class="text-slate-600 text-sm mt-1">Ujian Berbasis Komputer</p>
        </div>
        
        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Username / NIS</label>
                <input type="text" id="username" required class="w-full px-4 py-3 rounded-lg border border-white/50 bg-white/50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Password / Token</label>
                <input type="password" id="password" required class="w-full px-4 py-3 rounded-lg border border-white/50 bg-white/50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all">
            </div>
            <button type="submit" id="btnSubmit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg shadow-md transition-all">
                Masuk ke Sistem
            </button>
            <p id="errorMsg" class="text-red-500 text-sm text-center hidden"></p>
        </form>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwpCTU8zXjzM_HEE-TszBaBtU15GufPf4_rEgjLxHYp5onS6YnQdaM_lJFMpwjlRzlL7A/exec';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const error = document.getElementById('errorMsg');
            
            btn.innerHTML = 'Memproses...';
            btn.disabled = true;
            error.classList.add('hidden');

            const formData = new URLSearchParams();
            formData.append('action', 'login');
            formData.append('username', document.getElementById('username').value);
            formData.append('password', document.getElementById('password').value);

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (result.status === 'success') {
                    sessionStorage.setItem('userCBT', JSON.stringify(result));
                    if(result.role === 'admin' || result.role === 'guru') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'siswa.html';
                    }
                } else {
                    error.innerText = result.message;
                    error.classList.remove('hidden');
                }
            } catch (err) {
                error.innerText = "Gagal terhubung ke server.";
                error.classList.remove('hidden');
            } finally {
                btn.innerHTML = 'Masuk ke Sistem';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
